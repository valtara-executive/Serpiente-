name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Fix gradle-wrapper.jar
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O /tmp/gradle.zip
          unzip -p /tmp/gradle.zip gradle-8.2/lib/plugins/gradle-wrapper-8.2.jar > gradle/wrapper/gradle-wrapper.jar
          echo "JAR size: $(wc -c < gradle/wrapper/gradle-wrapper.jar) bytes"

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: StreamBrowser-APK
          path: app/build/outputs/apk/debug/app-debug.apk
